<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data:; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Dam Proxy tabs</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="status-indicator" id="statusIndicator"></div>
      <h2>Dam Proxy tabs</h2>
    </header>
    <div class="line"></div>
    <main class="popup-main">

      <div class="proxy-status chbox">
        <span id="statusText">Loading...</span>
        <label class="switch tgl-btn">
          <input class="tgl tgl-light" type="checkbox" id="toggleBtn">
          <span class="slider round tgl-btn"></span>
        </label>
      </div>
      <div class="line"></div>
      <div class="proxy-info">
        <div class="info-row">
            <span>Proxy:</span>
            <span id="proxyInfo">Not configured</span>
        </div>
        <div class="info-row">
            <span>Domains:</span>
            <span id="domainsCount">0</span>
        </div>
    </div>

    <div class="unproxied-section">
      <div class="unproxied-header" id="unproxiedToggle">
        <span>Unproxied domains (<span id="unproxiedCount">0</span>)</span>
        <span class="chevron">&#9660;</span>
      </div>
      <ul class="unproxied-list" id="unproxiedList"></ul>
    </div>

      <div class="line"></div>
      <div class="quick-actions">
        <button id="addCurrentBtn" class="action-btn">

            </div>
  
    </main>
    
    <footer class="popup-footer">

    </footer>
  </div>

</body>
